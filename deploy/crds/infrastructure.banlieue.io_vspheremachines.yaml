apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vspheremachines.infrastructure.banlieue.io
spec:
  group: infrastructure.banlieue.io
  names:
    categories: []
    kind: VSphereMachine
    plural: vspheremachines
    shortNames:
    - vsm
    singular: vspheremachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.providerRef.name
      name: Provider
      type: string
    - jsonPath: .status.initialization.provisioned
      name: Provisioned
      type: boolean
    - jsonPath: .spec.providerID
      name: ProviderID
      priority: 1
      type: string
    - jsonPath: .spec.cluster
      name: Cluster
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for VSphereMachineSpec via `CustomResource`
        properties:
          spec:
            properties:
              cluster:
                description: Compute cluster within the datacenter.
                type: string
              datacenter:
                description: Datacenter name.
                type: string
              datastore:
                description: Datastore or datastore cluster name (resolved from the storage class).
                type: string
              disks:
                description: |-
                  Disks. The first disk is the template's OS disk (grown if needed);
                  subsequent disks are blank.
                items:
                  properties:
                    name:
                      type: string
                    provisioning:
                      default: thin
                      description: Disk provisioning hint. Providers honor on a best-effort basis.
                      enum:
                      - thin
                      - thick
                      - eagerZeroed
                      type: string
                    sizeGiB:
                      format: uint32
                      minimum: 0.0
                      type: integer
                  required:
                  - name
                  - sizeGiB
                  type: object
                type: array
              failureDomain:
                description: |-
                  CAPI contract (optional): failure domain placement. The banlieue
                  scheduler writes the chosen failure domain here; for CAPI users the
                  parent Machine's `spec.failureDomain` is what populates this.
                nullable: true
                type: string
              firmware:
                description: Firmware. EFI / EFI Secure require the template to be EFI-capable.
                enum:
                - bios
                - efi
                - efi-secure
                type: string
              folder:
                description: VM folder path. Optional; defaults to the datacenter VM root.
                nullable: true
                type: string
              memoryMiB:
                description: Memory in MiB.
                format: uint32
                minimum: 0.0
                type: integer
              network:
                description: Network interfaces.
                items:
                  properties:
                    ipam:
                      description: |-
                        IPAM configuration for a network interface.

                        `source` selects the strategy and the matching sibling field
                        (`static` / `pool`) carries its parameters. `Dhcp` needs no parameters.

                        Wire shape (Kubernetes-idiomatic; chosen over a serde-tagged enum
                        because kube-derive's CRD schema flattener does not support per-variant
                        discriminator subschemas — see `.wolf/buglog.json` bug-006):

                        ```yaml
                        ipam:
                          source: dhcp                       # nothing else needed
                        ipam:
                          source: static
                          static:
                            address: 10.0.0.5
                            prefix: 24
                            gateway: 10.0.0.1
                        ipam:
                          source: pool
                          pool:
                            poolRef:
                              apiGroup: ipam.cluster.x-k8s.io
                              kind: IPAddressClaim
                              name: prod-pool
                        ```
                      properties:
                        pool:
                          description: Required when `source == Pool`; ignored otherwise.
                          nullable: true
                          properties:
                            poolRef:
                              description: |-
                                Typed reference (apiGroup + kind + name + optional namespace).

                                Used wherever the referenced kind is pluggable — e.g. IPAM pools, where we
                                want to accept either `ipam.cluster.x-k8s.io/IPAddressClaim` (CAPI's
                                default) or future banlieue-native pool types.
                              properties:
                                apiGroup:
                                  type: string
                                kind:
                                  type: string
                                name:
                                  type: string
                                namespace:
                                  nullable: true
                                  type: string
                              required:
                              - apiGroup
                              - kind
                              - name
                              type: object
                          required:
                          - poolRef
                          type: object
                        source:
                          description: |-
                            IPAM source. `Dhcp` is the default so a freshly-constructed `IpamSpec`
                            is a valid one.
                          enum:
                          - dhcp
                          - static
                          - pool
                          type: string
                        static:
                          description: Required when `source == Static`; ignored otherwise.
                          nullable: true
                          properties:
                            address:
                              type: string
                            gateway:
                              nullable: true
                              type: string
                            nameservers:
                              items:
                                type: string
                              type: array
                            prefix:
                              format: uint8
                              maximum: 255.0
                              minimum: 0.0
                              type: integer
                          required:
                          - address
                          - prefix
                          type: object
                      required:
                      - source
                      type: object
                    macAddress:
                      description: Optional MAC address (otherwise vCenter generates one).
                      nullable: true
                      type: string
                    name:
                      type: string
                    portGroup:
                      description: Resolved port group or distributed port group name.
                      type: string
                  required:
                  - ipam
                  - name
                  - portGroup
                  type: object
                type: array
              numCpus:
                description: Number of virtual CPUs.
                format: uint32
                minimum: 0.0
                type: integer
              providerID:
                description: |-
                  CAPI contract: Provider ID for the resulting Node, if this VM
                  becomes a Kubernetes node. Format: `vsphere://<vm-instance-uuid>`.
                  Set by the provider controller after the VM is created.
                nullable: true
                type: string
              providerRef:
                description: |-
                  Reference to the banlieue `Provider` whose connection details
                  describe the target vCenter.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              resourcePool:
                description: |-
                  Resource pool path within the cluster. Optional; defaults to the
                  cluster's root resource pool.
                nullable: true
                type: string
              template:
                description: vCenter template name (resolved from `VMImage`).
                type: string
            required:
            - cluster
            - datacenter
            - datastore
            - disks
            - firmware
            - memoryMiB
            - network
            - numCpus
            - providerRef
            - template
            type: object
          status:
            nullable: true
            properties:
              addresses:
                description: |-
                  CAPI contract field (optional): VM addresses. Surfaced to the parent
                  Machine's `status.addresses` once initialization is complete.
                items:
                  description: A typed machine address. Mirrors CAPI's `clusterv1.MachineAddress`.
                  properties:
                    address:
                      description: The address itself.
                      type: string
                    type:
                      description: 'Address type. Accepted: Hostname, ExternalIP, InternalIP, ExternalDNS, InternalDNS.'
                      enum:
                      - Hostname
                      - ExternalIP
                      - InternalIP
                      - ExternalDNS
                      - InternalDNS
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              conditions:
                description: |-
                  CAPI-compatible conditions (using `metav1.Condition`). The `Ready`
                  condition is mirrored as `InfrastructureReady` on the parent
                  (`clusterv1.Machine` or banlieue `VirtualMachine`) per contract.
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failureDomain:
                description: |-
                  CAPI contract field (optional): observed failure domain.
                  Surfaced to the parent Machine's `status.failureDomain`.
                nullable: true
                type: string
              initialization:
                default: {}
                description: 'CAPI contract field: replaces the deprecated v1beta1 `status.ready`.'
                properties:
                  provisioned:
                    description: |-
                      True when the infrastructure provider reports that the resource's
                      infrastructure is fully provisioned.
                    nullable: true
                    type: boolean
                type: object
              instanceUuid:
                description: |-
                  VM instance UUID. Stable across vCenter restarts and the source for
                  `spec.providerID`. Not part of the CAPI contract.
                nullable: true
                type: string
              observedGeneration:
                format: int64
                nullable: true
                type: integer
              vmRef:
                description: |-
                  VMware managed-object reference (vm-NNNN). Useful for operator
                  diagnostics. Not part of the CAPI contract.
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: VSphereMachine
        type: object
    served: true
    storage: true
    subresources:
      status: {}
