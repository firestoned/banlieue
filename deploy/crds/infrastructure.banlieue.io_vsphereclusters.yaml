apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    cluster.x-k8s.io/v1beta2: v1alpha1
  name: vsphereclusters.infrastructure.banlieue.io
spec:
  group: infrastructure.banlieue.io
  names:
    categories: []
    kind: VSphereCluster
    plural: vsphereclusters
    shortNames:
    - vsc
    singular: vspherecluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.initialization.provisioned
      name: Provisioned
      type: boolean
    - jsonPath: .status.controlPlaneEndpoint.host
      name: Endpoint
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VSphereCluster — banlieue's CAPI v1beta2 InfraCluster for vSphere backends.

          It tells CAPI where a cluster's machines may be placed by aggregating the
          failure domains of one or more `Provider`s (vCenters) into the CAPI-shaped
          `status.failureDomains` list. The control-plane endpoint is operator-supplied
          (a VIP) or filled in by the control-plane provider (e.g. k0smotron).

          # Why it exists

          - **Cluster-side failure-domain spread.** CAPI's control-plane / MachineSet
            controllers balance machines across the FDs published here. "Spread across
            all 6 domains" is simply `replicas: 6` over a `VSphereCluster` that
            advertises 6 FDs.
          - **Multi-vCenter clusters.** One Kubernetes cluster can span several
            `Provider`s — a capability beyond single-vCenter CAPV.

          You do not create the resulting VMs by hand; CAPI mints `VSphereMachine`s
          (the InfraMachine) from a `VSphereMachineTemplate`. This object only
          advertises *where* they may go.
        properties:
          spec:
            description: |-
              VSphereCluster — banlieue's CAPI v1beta2 InfraCluster for vSphere backends.

              It tells CAPI where a cluster's machines may be placed by aggregating the
              failure domains of one or more `Provider`s (vCenters) into the CAPI-shaped
              `status.failureDomains` list. The control-plane endpoint is operator-supplied
              (a VIP) or filled in by the control-plane provider (e.g. k0smotron).

              # Why it exists

              - **Cluster-side failure-domain spread.** CAPI's control-plane / MachineSet
                controllers balance machines across the FDs published here. "Spread across
                all 6 domains" is simply `replicas: 6` over a `VSphereCluster` that
                advertises 6 FDs.
              - **Multi-vCenter clusters.** One Kubernetes cluster can span several
                `Provider`s — a capability beyond single-vCenter CAPV.

              You do not create the resulting VMs by hand; CAPI mints `VSphereMachine`s
              (the InfraMachine) from a `VSphereMachineTemplate`. This object only
              advertises *where* they may go.
            properties:
              controlPlaneEndpoint:
                description: |-
                  CAPI contract (optional): the cluster's API-server endpoint. Operator-
                  supplied control-plane VIP, or left unset for a control-plane provider
                  (e.g. k0smotron) to manage. Mirrored to `status.controlPlaneEndpoint`.
                nullable: true
                properties:
                  host:
                    description: Hostname or IP on which the API server is serving.
                    type: string
                  port:
                    description: Port on which the API server is serving.
                    format: int32
                    type: integer
                required:
                - host
                - port
                type: object
              controlPlaneFailureDomainSelector:
                description: |-
                  Which aggregated failure domains are eligible to run control-plane
                  nodes, matched against the Provider FD `labels`. When unset, **all**
                  aggregated FDs are control-plane eligible. Use this to keep the etcd
                  quorum to a bounded, odd set of domains while workers spread wider.
                nullable: true
                properties:
                  matchExpressions:
                    items:
                      properties:
                        key:
                          type: string
                        operator:
                          enum:
                          - In
                          - NotIn
                          - Exists
                          - DoesNotExist
                          type: string
                        values:
                          items:
                            type: string
                          type: array
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                  matchLabels:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              paused:
                description: |-
                  Suspend reconciliation. Equivalent to the `cluster.x-k8s.io/paused`
                  annotation but in-band.
                type: boolean
              providerRefs:
                description: |-
                  Explicit list of `Provider`s (in this namespace) to aggregate. Takes
                  precedence over `providerSelector` when non-empty. Declaring the set
                  explicitly is the preferred, "explicit over implicit" form.
                items:
                  description: Reference to an object in the same namespace.
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              providerSelector:
                description: |-
                  Select `Provider`s (in this namespace) to aggregate failure domains
                  from, by matching their labels. Ignored when `providerRefs` is set.
                properties:
                  matchExpressions:
                    items:
                      properties:
                        key:
                          type: string
                        operator:
                          enum:
                          - In
                          - NotIn
                          - Exists
                          - DoesNotExist
                          type: string
                        values:
                          items:
                            type: string
                          type: array
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                  matchLabels:
                    additionalProperties:
                      type: string
                    type: object
                type: object
            type: object
          status:
            description: |-
              Observed state of a VSphereCluster, shaped to the CAPI v1beta2 InfraCluster
              status contract.
            nullable: true
            properties:
              conditions:
                description: |-
                  CAPI-compatible conditions. The `Ready` condition is mirrored to the
                  parent `Cluster`'s `InfrastructureReady`; `Paused` reflects pause state.
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              controlPlaneEndpoint:
                description: |-
                  CAPI contract field (optional): the resolved API-server endpoint,
                  echoed from `spec.controlPlaneEndpoint` or set by the control-plane
                  provider.
                nullable: true
                properties:
                  host:
                    description: Hostname or IP on which the API server is serving.
                    type: string
                  port:
                    description: Port on which the API server is serving.
                    format: int32
                    type: integer
                required:
                - host
                - port
                type: object
              failureDomains:
                description: |-
                  CAPI contract field: the failure domains machines may be placed in,
                  aggregated from the selected `Provider`s. A **list** per v1beta2.
                items:
                  description: |-
                    CAPI v1beta2 `clusterv1.FailureDomain` — one element of an InfraCluster's
                    `status.failureDomains` list.

                    In v1beta2 failure domains are a **list** (the v1beta1 map was retired).
                    banlieue's `VSphereCluster` reconciler translates each selected
                    `Provider.status.failureDomains[]` entry into one of these, carrying the
                    banlieue FD `name` through, flattening provider attributes into
                    `attributes`, and setting `control_plane` from the cluster's
                    control-plane FD selector.
                  properties:
                    attributes:
                      additionalProperties:
                        type: string
                      description: |-
                        Arbitrary attributes for consumers. banlieue flattens the Provider FD's
                        `attributes.raw` plus `dc`/`cluster` labels into this map.
                      type: object
                    controlPlane:
                      description: |-
                        Whether this failure domain is eligible to run control-plane nodes.
                        `None` is treated by CAPI as "not control-plane eligible".
                      nullable: true
                      type: boolean
                    name:
                      description: |-
                        Unique failure-domain name (one of the Provider's
                        `status.failureDomains[].name`).
                      type: string
                  required:
                  - name
                  type: object
                type: array
              initialization:
                default: {}
                description: |-
                  CAPI contract field: replaces the deprecated v1beta1 `status.ready`.
                  `provisioned == true` once the failure domains are resolved (and the
                  control-plane endpoint is known, when one is required).
                properties:
                  provisioned:
                    description: |-
                      True when the infrastructure provider reports that the resource's
                      infrastructure is fully provisioned.
                    nullable: true
                    type: boolean
                type: object
              observedGeneration:
                description: The generation of the spec the controller has reconciled.
                format: int64
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: VSphereCluster
        type: object
    served: true
    storage: true
    subresources:
      status: {}
