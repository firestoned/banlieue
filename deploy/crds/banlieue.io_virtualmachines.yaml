apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: virtualmachines.banlieue.io
spec:
  group: banlieue.io
  names:
    categories: []
    kind: VirtualMachine
    plural: virtualmachines
    shortNames:
    - vm
    singular: virtualmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.classRef.name
      name: Class
      type: string
    - jsonPath: .spec.imageRef.name
      name: Image
      type: string
    - jsonPath: .status.scheduled.providerName
      name: Provider
      type: string
    - jsonPath: .status.scheduled.failureDomain
      name: FailureDomain
      priority: 1
      type: string
    - jsonPath: .status.observedPowerState
      name: Power
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for VirtualMachineSpec via `CustomResource`
        properties:
          spec:
            properties:
              classRef:
                description: Reference to a (cluster-scoped) VMClass.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              desiredPowerState:
                default: PoweredOn
                description: Desired power state. Defaults to `PoweredOn`.
                enum:
                - PoweredOn
                - PoweredOff
                - Suspended
                type: string
              imageRef:
                description: Reference to a (cluster-scoped) VMImage.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              migrationPolicy:
                default: automatic
                description: What to do when current placement no longer satisfies the spec.
                enum:
                - automatic
                - manual
                - never
                type: string
              paused:
                description: Suspend reconciliation in-band.
                type: boolean
              placement:
                default: {}
                description: |-
                  Placement intent. If unset, the scheduler considers every Provider
                  in the VM's namespace and every failure domain.
                properties:
                  antiAffinity:
                    description: |-
                      Anti-affinity rules against other VirtualMachines in the same
                      namespace. Evaluated at scheduling time.
                    items:
                      properties:
                        labelSelector:
                          description: Other VMs (by their own metadata.labels) to spread away from.
                          properties:
                            matchExpressions:
                              items:
                                properties:
                                  key:
                                    type: string
                                  operator:
                                    enum:
                                    - In
                                    - NotIn
                                    - Exists
                                    - DoesNotExist
                                    type: string
                                  values:
                                    items:
                                      type: string
                                    type: array
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                            matchLabels:
                              additionalProperties:
                                type: string
                              type: object
                          type: object
                        mode:
                          default: required
                          description: Strictness. `required` filters candidates; `preferred` is best-effort.
                          enum:
                          - required
                          - preferred
                          type: string
                        topologyKey:
                          description: |-
                            A label key from the failure domain's labels. Spreading is required
                            across distinct values of this key.
                            Common keys: `cluster`, `rack`, `host`, `dc`.
                          type: string
                      required:
                      - labelSelector
                      - topologyKey
                      type: object
                    type: array
                  failureDomainSelector:
                    description: |-
                      Match failure domains by their `status.failureDomains[].labels`.
                      Across all candidate Providers, only failure domains whose labels
                      match are considered.
                    nullable: true
                    properties:
                      matchExpressions:
                        items:
                          properties:
                            key:
                              type: string
                            operator:
                              enum:
                              - In
                              - NotIn
                              - Exists
                              - DoesNotExist
                              type: string
                            values:
                              items:
                                type: string
                              type: array
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                      matchLabels:
                        additionalProperties:
                          type: string
                        type: object
                    type: object
                  providerSelector:
                    description: |-
                      Match Providers by their `metadata.labels`. A Provider is a candidate
                      only if its labels match this selector.
                    nullable: true
                    properties:
                      matchExpressions:
                        items:
                          properties:
                            key:
                              type: string
                            operator:
                              enum:
                              - In
                              - NotIn
                              - Exists
                              - DoesNotExist
                              type: string
                            values:
                              items:
                                type: string
                              type: array
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                      matchLabels:
                        additionalProperties:
                          type: string
                        type: object
                    type: object
                type: object
              userData:
                description: |-
                  Optional user-data delivered to the guest via the image's
                  `guestAgent` (cloud-init / ignition / sysprep).
                nullable: true
                properties:
                  key:
                    default: user-data
                    description: |-
                      Key within the Secret containing the user-data blob.
                      Default: `user-data`.
                    type: string
                  secretRef:
                    description: Secret in the VirtualMachine's namespace.
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                required:
                - secretRef
                type: object
            required:
            - classRef
            - imageRef
            type: object
          status:
            nullable: true
            properties:
              addresses:
                description: Mirrored from the infra CR's `status.addresses`.
                items:
                  description: A typed machine address. Mirrors CAPI's `clusterv1.MachineAddress`.
                  properties:
                    address:
                      description: The address itself.
                      type: string
                    type:
                      description: 'Address type. Accepted: Hostname, ExternalIP, InternalIP, ExternalDNS, InternalDNS.'
                      enum:
                      - Hostname
                      - ExternalIP
                      - InternalIP
                      - ExternalDNS
                      - InternalDNS
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              conditions:
                description: |-
                  Standard Kubernetes conditions. Required types:
                    `Ready`               — overall readiness
                    `Scheduled`           — placement decision exists and is current
                    `PlacementValid`      — current placement satisfies the spec
                    `InfrastructureReady` — mirrors the infra CR's Ready condition
                  Optional:
                    `Migrating`           — true while a migration is in progress
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              infrastructureRef:
                description: |-
                  Reference to the provider-specific infrastructure CR
                  (e.g. `infrastructure.banlieue.io/v1alpha1/VSphereMachine`).
                  Set after scheduling, owned by this VirtualMachine.
                nullable: true
                properties:
                  apiGroup:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    nullable: true
                    type: string
                required:
                - apiGroup
                - kind
                - name
                type: object
              initialization:
                default: {}
                description: Mirrored from the infra CR's `status.initialization`.
                properties:
                  provisioned:
                    description: |-
                      True when the infrastructure provider reports that the resource's
                      infrastructure is fully provisioned.
                    nullable: true
                    type: boolean
                type: object
              observedGeneration:
                format: int64
                nullable: true
                type: integer
              observedPowerState:
                description: Observed power state from the provider.
                enum:
                - PoweredOn
                - PoweredOff
                - Suspended
                - null
                nullable: true
                type: string
              scheduled:
                description: Current scheduling decision. Absent until first successful schedule.
                nullable: true
                properties:
                  failureDomain:
                    description: Failure domain name (one of the Provider's `status.failureDomains[].name`).
                    type: string
                  providerClass:
                    description: Provider's ProviderClass (denormalized for convenience in printer columns).
                    type: string
                  providerName:
                    description: Provider name (in the VM's namespace).
                    type: string
                  resolvedNetworks:
                    description: Resolved network class → concrete backend identifier mappings.
                    items:
                      properties:
                        backendId:
                          description: Backend identifier the provider resolved to (e.g. "ds-fast-01", "vmnet-prod").
                          type: string
                        className:
                          description: Class name as referenced in the VMClass (e.g. "gold", "prod").
                          type: string
                      required:
                      - backendId
                      - className
                      type: object
                    type: array
                  resolvedStorage:
                    description: Resolved storage class → concrete backend identifier mappings.
                    items:
                      properties:
                        backendId:
                          description: Backend identifier the provider resolved to (e.g. "ds-fast-01", "vmnet-prod").
                          type: string
                        className:
                          description: Class name as referenced in the VMClass (e.g. "gold", "prod").
                          type: string
                      required:
                      - backendId
                      - className
                      type: object
                    type: array
                  scheduledAt:
                    description: Time the placement decision was made.
                    format: date-time
                    nullable: true
                    type: string
                required:
                - failureDomain
                - providerClass
                - providerName
                type: object
            type: object
        required:
        - spec
        title: VirtualMachine
        type: object
    served: true
    storage: true
    subresources:
      status: {}
