apiVersion: v1
kind: Service
metadata:
  name: banlieue-controller
  namespace: banlieue-system
  labels:
    app.kubernetes.io/name: banlieue
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: banlieue
    app.kubernetes.io/component: controller
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
