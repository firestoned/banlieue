#
# banlieue-controller Deployment.
#
# Pin image to a released tag for production manifests. Local development
# overrides this via `kubectl set image` (see the Makefile `kind-deploy-controller`
# target) so the locally-built image is used.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banlieue-controller
  namespace: banlieue-system
  labels:
    app.kubernetes.io/name: banlieue
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: banlieue
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: banlieue
        app.kubernetes.io/component: controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: banlieue-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          # Single banlieue binary; the `controller` subcommand selects this
          # role (ADR-0004). Pin to a released version tag — NEVER use :latest
          # in production manifests. Local development uses `kubectl set image`
          # to swap in ghcr.io/firestoned/banlieue:local-dev (Makefile target
          # kind-deploy-controller).
          image: ghcr.io/firestoned/banlieue:v0.1.0
          imagePullPolicy: IfNotPresent
          args: ["controller"]
          envFrom:
            - configMapRef:
                name: banlieue-controller-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      terminationGracePeriodSeconds: 30
