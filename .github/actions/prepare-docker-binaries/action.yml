#
# Download the per-arch `banlieue-linux-*` build artifacts and stage them at
# `binaries/<arch>/banlieue`, the layout the Dockerfiles `COPY` from
# (`COPY binaries/${TARGETARCH}/${BINARY} /app`). Used by the multi-arch buildx
# `docker` job so it never recompiles inside the image build.
name: Prepare Docker binaries
description: Stage pre-built banlieue binaries at binaries/<arch>/ for the Dockerfiles.

runs:
  using: composite
  steps:
    - name: Download binary artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: banlieue-linux-*
        path: ./artifacts

    - name: Stage binaries
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p binaries/amd64 binaries/arm64
        cp artifacts/banlieue-linux-amd64/banlieue binaries/amd64/banlieue
        cp artifacts/banlieue-linux-arm64/banlieue binaries/arm64/banlieue
        chmod +x binaries/amd64/banlieue binaries/arm64/banlieue
        ls -lh binaries/amd64/banlieue binaries/arm64/banlieue
