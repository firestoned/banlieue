#
# A vCenter in datacenter 1, with two failure domains (compute clusters)
# and admin-defined storage / network class mappings.
apiVersion: banlieue.io/v1alpha1
kind: Provider
metadata:
  name: vcenter-dc1
  namespace: ops
  labels:
    dc: dc1
    env: prod
spec:
  providerClassRef:
    name: vsphere
  connection:
    endpoint: https://vcenter-dc1.corp.example/sdk
    credentialsRef:
      name: vcenter-dc1-creds
    insecureSkipTLSVerify: false
  capabilities:
    storageClasses:
      - name: gold
        target:
          datastoreCluster: dsc-gold
      - name: silver
        target:
          datastoreCluster: dsc-silver
    networkClasses:
      - name: prod
        target:
          portGroup: vmnet-prod
      - name: mgmt
        target:
          portGroup: vmnet-mgmt
    features:
      - hotAddCPU
      - hotAddMemory
      - efiSecureBoot
