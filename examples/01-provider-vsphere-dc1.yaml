#
# A vCenter in datacenter 1, with two failure domains (compute clusters)
# and admin-defined storage / network class mappings.
apiVersion: banlieue.io/v1alpha1
kind: Provider
metadata:
  name: vcenter-dc1
  namespace: banlieue-system
  labels:
    dc: dc1
    env: prod
spec:
  providerClassRef:
    name: vsphere
  connection:
    endpoint: https://vcenter-dc1.corp.example/sdk
    credentialsRef:
      name: vcenter-dc1-creds
    insecureSkipTLSVerify: false
    # Validate the vCenter cert against a private/corporate CA (ADR-0008).
    # Set EXACTLY ONE of inline / configMapRef / secretRef; omit caBundle
    # entirely to use the system trust roots. `key` defaults to `ca.crt`.
    #
    # caBundle:
    #   configMapRef:           # centrally-managed, non-secret trust bundle
    #     name: corp-ca-bundle
    #     # key: ca.crt
    #   # secretRef:            # for sensitive CA material
    #   #   name: vcenter-ca
    #   # inline: |             # or paste the PEM directly
    #   #   -----BEGIN CERTIFICATE-----
    #   #   ...
    #   #   -----END CERTIFICATE-----
  capabilities:
    storageClasses:
      - name: gold
        target:
          datastoreCluster: dsc-gold
      - name: silver
        target:
          datastoreCluster: dsc-silver
    networkClasses:
      - name: prod
        target:
          portGroup: vmnet-prod
      - name: mgmt
        target:
          portGroup: vmnet-mgmt
    features:
      - hotAddCPU
      - hotAddMemory
      - efiSecureBoot
# Status is written by the vSphere provider controller after introspection,
# shown here for reference:
# status:
#   failureDomains:
#     - name: dc1-cluster-a
#       labels: { dc: dc1, env: prod, cluster: cluster-a }
#       attributes:
#         availableStorageClasses: [gold, silver]
#         availableNetworkClasses: [prod, mgmt]
#         features: [hotAddCPU, hotAddMemory, efiSecureBoot]
#         raw:
#           datacenter: DC-East
#           cluster: Compute-A
#     - name: dc1-cluster-b
#       labels: { dc: dc1, env: nonprod, cluster: cluster-b }
#       attributes:
#         availableStorageClasses: [silver]
#         availableNetworkClasses: [prod, mgmt]
#         features: [hotAddCPU, hotAddMemory]
#         raw:
#           datacenter: DC-East
